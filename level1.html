<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Уровень 1</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="app">
        <div class="game-container" id="gameContainer">
            <!-- Фон -->
            <div class="background-layer" id="backgroundLayer"></div>
            
            <!-- Персонажи (слой поверх фона) -->
            <div class="characters-layer" id="charactersLayer"></div>
            
            <!-- Кликабельные зоны -->
            <div class="clickzones-layer" id="clickzonesLayer"></div>
            
            <!-- Диалоговое окно -->
            <div class="dialog-container" id="dialogContainer" style="display: none;">
                <div class="dialog-bubble" id="dialogBubble">
                    <p id="dialogText"></p>
                </div>
                <button class="dialog-next-btn" id="dialogNextBtn">Далее</button>
            </div>
            
            <!-- Кнопки действий -->
            <div class="action-buttons" id="actionButtons"></div>
            
            <!-- Счётчик заданий -->
            <div class="quest-counter" id="questCounter" style="display: none;">
                <i class="fas fa-star"></i> Прогресс: <span id="progressCount">0</span>/<span id="progressTotal">3</span>
            </div>
        </div>
    </div>
    
    <!-- Звуки для 1-го уровня -->
    <audio id="level1Music" src="sounds/level1_music.mp3" preload="auto" loop></audio>
    <audio id="moveSound" src="sounds/move_sound.mp3" preload="auto"></audio>
    <audio id="successSound" src="sounds/success_sound.mp3" preload="auto"></audio>
    <audio id="failSound" src="sounds/fail_sound.mp3" preload="auto"></audio>
    <audio id="portalSound" src="sounds/portal_sound.mp3" preload="auto"></audio>
    <!-- <button class="dialog-next-btn" id="dialogNextBtn">Далее</button> -->
    <!-- Кнопка звука -->
    <button id="soundToggleBtn" style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 200;
        padding: 12px 16px;
        background: #f0c674;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        font-family: inherit;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        gap: 8px;
    ">🔊 Звук вкл</button>
    
    <script src="js/common.js"></script>
    <script src="levels/level1/level1.js"></script>
    <script>
        // Запуск 1-го уровня
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof Level1 !== 'undefined') {
                Level1.init();
            } else {
                console.error('Level1 не загружен');
            }
        });
    </script>
</body>
</html>
