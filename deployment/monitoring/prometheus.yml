global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - "alertmanager:9093"

scrape_configs:
  # 1. Scraping Core Unified Applet Engine metrics
  - job_name: "quest-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:3000"]

  # 2. Database postgresql metrics scraping
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  # 3. Cache layer Redis metrics scraping
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis_exporter:9121"]

  # 4. Host OS Node Exporter
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  # 5. Container-level resources utilization scraping (cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
