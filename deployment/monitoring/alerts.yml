groups:
  - name: quest_platform_alert_rules
    rules:
      # Alert when a service goes offline
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service instance {{ $labels.instance }} is currently unresponsive"
          description: "Target metric scraping indicates that service instance has been offline for over 1 minute."

      # Alert when CPU utilization surpasses 85%
      - alert: HighCPUUsage
        expr: node_cpu_seconds_total{mode="idle"} < 0.15
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU stress on node: {{ $labels.instance }}"
          description: "Active system CPU utilization is currently exceeding 85% for more than 2 minutes."

      # Alert when available Memory falls under 10%
      - alert: LowMemoryWarning
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Low memory available on host: {{ $labels.instance }}"
          description: "Free RAM capacity is lower than 10% total threshold limit."

      # Alert when database connection fails
      - alert: PostgreSQLConnectionFailed
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL Database engine is offline"
          description: "Relational storage instance is completely unreachable by the exporter driver."

      # Alert when Redis cache fails
      - alert: RedisConnectionFailed
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis cache memory instance is offline"
          description: "Socket IO event router and key/value memory caching adapter is down."
