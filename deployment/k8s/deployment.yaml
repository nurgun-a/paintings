apiVersion: v1
kind: Namespace
metadata:
  name: ai-quest-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: ai-quest-platform
data:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://quest_admin:secure_quest_db_password_2026@postgres-service:5432/quest_db?schema=public"
  REDIS_URL: "redis://redis-service:6379/0"
  S3_ENDPOINT: "http://minio-service:9000"
  S3_BUCKET_NAME: "quest-assets"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: ai-quest-platform
type: Opaque
data:
  # Base64 encoded: secure_quest_db_password_2026
  POSTGRES_PASSWORD: "c2VjdXJlX3F1ZXN0X2RiX3Bhc3N3b3JkXzIwMjY="
  # Base64 encoded placeholder key
  GEMINI_API_KEY: "QUl6YVN5QXdDYW1pXzIwMjZfc2VjdXJlX2tleV9nZW1pbmk="
  # Base64 encoded: super_secret_jwt_access_token_sign_key_2026
  JWT_ACCESS_SECRET: "c3VwZXJfc2VjcmV0X2p3dF9hY2Nlc3NfdG9rZW5fc2lnbl9rZXlfMjAyNg=="
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: ai-quest-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: ai-quest-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "quest_admin"
            - name: POSTGRES_DB
              value: "quest_db"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: ai-quest-platform
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-app-deployment
  namespace: ai-quest-platform
spec:
  replicas: 3 # Multi-replica horizontal scaling
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: platform-app
  template:
    metadata:
      labels:
        app: platform-app
    spec:
      containers:
        - name: platform-app
          image: gcr.io/ai-quest-platform/app:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GEMINI_API_KEY
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_ACCESS_SECRET
          # Probes config for health check validation
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: platform-app-service
  namespace: ai-quest-platform
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: platform-app
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: ai-quest-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/websocket-services: platform-app-service
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: questplatform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-app-service
                port:
                  number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-app-hpa
  namespace: ai-quest-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-app-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
