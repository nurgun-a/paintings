version: '3.8'

services:
  # AI Quest Platform Core Full-Stack Application & Realtime Gateway
  app:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
    container_name: quest_platform_app
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://quest_admin:secure_quest_db_password_2026@postgres:5432/quest_db?schema=public
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-super_secret_jwt_access_token_sign_key_2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-super_secret_jwt_refresh_token_sign_key_2026}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=quest_minio_admin
      - S3_SECRET_KEY=quest_minio_secret_key_2026
      - S3_BUCKET_NAME=quest-assets
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform-network

  # PostgreSQL Relational Database Service
  postgres:
    image: postgres:15-alpine
    container_name: quest_platform_postgres
    restart: always
    environment:
      - POSTGRES_USER=quest_admin
      - POSTGRES_PASSWORD=secure_quest_db_password_2026
      - POSTGRES_DB=quest_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quest_admin -d quest_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # Redis Multi-User Memory Cache & Event Streaming Adapter
  redis:
    image: redis:7-alpine
    container_name: quest_platform_redis
    restart: always
    command: redis-server --appendonly yes --requirepass secure_redis_auth_2026
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secure_redis_auth_2026", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # MinIO S3-Compatible Media, Photo, & Static Assets Storage
  minio:
    image: minio/minio:RELEASE.2023-08-29T23-07-35Z
    container_name: quest_platform_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=quest_minio_admin
      - MINIO_ROOT_PASSWORD=quest_minio_secret_key_2026
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - platform-network

  # Nginx Gateway Load Balancer, SSL Termination, & Static Delivery
  nginx:
    image: nginx:1.25-alpine
    container_name: quest_platform_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - web_static_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - platform-network

  # Prometheus Telemetry Metric Aggregator
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: quest_platform_prometheus
    restart: always
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - platform-network

  # Grafana Dashboard Analytics Suite
  grafana:
    image: grafana/grafana:10.1.2
    container_name: quest_platform_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=secure_grafana_admin_password_2026
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - platform-network

  # Grafana Loki Logs Aggregation Engine
  loki:
    image: grafana/loki:2.9.1
    container_name: quest_platform_loki
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - platform-network

  # Grafana Tempo Distributed Tracing Analyzer
  tempo:
    image: grafana/tempo:2.2.3
    container_name: quest_platform_tempo
    restart: always
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ../monitoring/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317" # otlp grpc
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  prometheus_data:
  web_static_cache:
