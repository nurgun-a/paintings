# Default values for ai-quest-platform.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3

image:
  repository: gcr.io/ai-quest-platform/app
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v1.0.0"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/websocket-services: "platform-app-service"
  hosts:
    - host: questplatform.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

# Persistent Database configurations
postgresql:
  enabled: true
  storageSize: 10Gi
  auth:
    username: quest_admin
    database: quest_db
    password: "secure_quest_db_password_2026"

redis:
  enabled: true
  auth:
    password: "secure_redis_auth_2026"

# Platform API environments configurations
env:
  nodeEnv: "production"
  jwtAccessSecret: "super_secret_jwt_access_token_sign_key_2026"
  jwtRefreshSecret: "super_secret_jwt_refresh_token_sign_key_2026"
  geminiApiKey: "AIzaSyAwCami_2026_secure_key_gemini"
  s3BucketName: "quest-assets"
